name: Node.js CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - name: Step 1 - Checkout Code
        uses: actions/checkout@v4

      - name: Step 2 - Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Step 3 - Install Dependencies
        run: npm ci

      - name: Step 4 - Run Tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Step 5 - Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Step 1 - Checkout Code
        uses: actions/checkout@v4

      - name: Step 2 - Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Step 3 - Install Dependencies
        run: npm ci

      - name: Step 4 - Check Code Quality
        run: |
          echo "Code quality check passed"
          find src -name "*.js" | head -20

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Step 1 - Checkout Code
        uses: actions/checkout@v4

      - name: Step 2 - Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Step 3 - Install Dependencies
        run: npm ci --only=production

      - name: Step 4 - Verify App Starts
        run: |
          node src/app.js &
          APP_PID=$!
          sleep 3
          curl -f http://localhost:3000/health || exit 1
          kill $APP_PID
          echo "App health check passed!"
        env:
          NODE_ENV: production
          PORT: 3000

      - name: Step 5 - Create Build Artifact
        run: |
          mkdir -p build
          cp -r src build/
          cp package.json build/
          echo "Build: ${{ github.sha }}" > build/version.txt
          echo "Date: $(date)" >> build/version.txt

      - name: Step 6 - Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-app-build
          path: build/
          retention-days: 7

  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Step 1 - Checkout Code
        uses: actions/checkout@v4

      - name: Step 2 - Download Build
        uses: actions/download-artifact@v4
        with:
          name: nodejs-app-build
          path: build/

      - name: Step 3 - Deploy Info
        run: |
          echo "App      : nodejs-cicd-app"
          echo "Version  : ${{ github.sha }}"
          echo "Branch   : ${{ github.ref_name }}"
          echo "Actor    : ${{ github.actor }}"
          echo "Date     : $(date)"

      - name: Step 4 - Simulate Deploy
        run: |
          echo "Deploying application..."
          echo "Dependencies installed"
          echo "Health checks passed"
          echo "Application deployed successfully!"

      - name: Step 5 - Deployment Summary
        run: |
          echo "## Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App | nodejs-cicd-app |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed By | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
